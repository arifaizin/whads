<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Whads - Kirim pesan WhatsApp tanpa simpan nomor">
    <meta name="theme-color" content="#25D366">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <title>Whads - WhatsApp Direct Send</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .logo svg {
            width: 50px;
            height: 50px;
            fill: white;
        }
        h1 {
            color: #128C7E;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
        }
        input.error {
            border-color: #ff4444;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        textarea {
            resize: vertical;
            min-height: 100px;
            max-height: 200px;
        }
        .error-message {
            color: #ff4444;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        .error-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .send-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }
        .send-button:active {
            transform: translateY(0);
        }
        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .install-prompt {
            background: #f0f9ff;
            border: 2px solid #25D366;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .install-prompt.show {
            display: flex;
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .install-prompt-text {
            flex: 1;
            font-size: 14px;
            color: #333;
        }
        .install-button {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .close-prompt {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            width: 24px;
            height: 24px;
        }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 24px; }
            .logo { width: 70px; height: 70px; }
            .logo svg { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="installPrompt" class="install-prompt">
            <div class="install-prompt-text">📱 Install Whads untuk akses lebih cepat!</div>
            <button id="installButton" class="install-button">Install</button>
            <button id="closePrompt" class="close-prompt">×</button>
        </div>
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
            </div>
            <h1>Whads</h1>
            <p class="subtitle">Kirim pesan WhatsApp tanpa simpan nomor</p>
        </div>
        <form id="whatsappForm">
            <div class="form-group">
                <label for="phoneNumber">Nomor WhatsApp</label>
                <input type="text" id="phoneNumber" placeholder="08123456789 atau +628123456789" autocomplete="off">
                <div id="phoneError" class="error-message">Nomor tidak valid</div>
                <div class="hint">Format: 08xxx, +628xxx, atau 628xxx</div>
            </div>
            <div class="form-group">
                <label for="message">Pesan (Opsional)</label>
                <textarea id="message" placeholder="Tulis pesan Anda di sini..."></textarea>
            </div>
            <button type="submit" class="send-button" id="sendButton">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:24px;height:24px;fill:white">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
                Kirim ke WhatsApp
            </button>
        </form>
    </div>
    <script>
        let deferredPrompt;
        const phoneInput = document.getElementById('phoneNumber');
        const messageInput = document.getElementById('message');
        const form = document.getElementById('whatsappForm');
        const phoneError = document.getElementById('phoneError');
        const installPrompt = document.getElementById('installPrompt');
        const installButton = document.getElementById('installButton');
        const closePrompt = document.getElementById('closePrompt');

        function formatPhoneNumber(phone) {
            phone = phone.replace(/[\s\-\(\)]/g, '');
            if (phone.startsWith('08')) {
                return '+628' + phone.substring(2);
            } else if (phone.startsWith('+628')) {
                return phone;
            } else if (phone.startsWith('628')) {
                return '+' + phone;
            } else if (phone.startsWith('8')) {
                return '+62' + phone;
            }
            return null;
        }

        function validatePhoneNumber(phone) {
            const formatted = formatPhoneNumber(phone);
            if (!formatted) return false;
            const digits = formatted.replace(/\D/g, '');
            return digits.length >= 11 && digits.length <= 15;
        }

        phoneInput.addEventListener('input', function() {
            if (this.value && !validatePhoneNumber(this.value)) {
                this.classList.add('error');
                phoneError.classList.add('show');
            } else {
                this.classList.remove('error');
                phoneError.classList.remove('show');
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = phoneInput.value.trim();
            if (!phone) {
                phoneInput.classList.add('error');
                phoneError.textContent = 'Nomor tidak boleh kosong';
                phoneError.classList.add('show');
                return;
            }
            if (!validatePhoneNumber(phone)) {
                phoneInput.classList.add('error');
                phoneError.textContent = 'Format nomor tidak valid';
                phoneError.classList.add('show');
                return;
            }
            const formattedPhone = formatPhoneNumber(phone);
            const message = messageInput.value.trim();
            let url = `https://wa.me/${formattedPhone.replace(/\+/g, '')}`;
            if (message) {
                url += `?text=${encodeURIComponent(message)}`;
            }
            window.open(url, '_blank');
        });

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.classList.add('show');
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installPrompt.classList.remove('show');
            }
        });

        closePrompt.addEventListener('click', () => {
            installPrompt.classList.remove('show');
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(() => {});
        }
    </script>
</body>
</html>
